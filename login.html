<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NAPA Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#071923;
    --card:#0d2533;
    --input:#123246;
    --green:#00d26a;
    --green-dark:#00b85c;
    --text:#ffffff;
    --secondary:#9fb3c8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:var(--card);
    padding:35px 25px;
    border-radius:28px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.logo{
    text-align:center;
    color:var(--green);
    font-size:42px;
    font-weight:700;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:var(--secondary);
    margin-bottom:30px;
    font-size:15px;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:15px;
    background:var(--input);
    color:white;
    border:none;
    border-radius:16px;
    outline:none;
    font-size:16px;
}

input::placeholder{
    color:var(--secondary);
}

button{
    width:100%;
    padding:16px;
    background:linear-gradient(
        135deg,
        var(--green),
        var(--green-dark)
    );
    color:white;
    border:none;
    border-radius:16px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.footer{
    text-align:center;
    margin-top:20px;
}

.footer p{
    color:var(--secondary);
    margin-bottom:5px;
}

.footer a{
    color:var(--green);
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">
            NAPA
        </div>

        <div class="subtitle">
            Njan Allathe Pinne Aaru ?
        </div>

        <input
        type="email"
        id="email"
        placeholder="Email Address">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <div class="footer">
            <p>New User?</p>
            <a href="signup.html">
                Create Account
            </a>
        </div>

    </div>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

window.login = function(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    signInWithEmailAndPassword(
        auth,
        email,
        password
    )
    .then(() => {

        location.href = "hostel.html";

    })
    .catch((error) => {

        alert(error.message);

    });

}

</script>

</body>
</html>
