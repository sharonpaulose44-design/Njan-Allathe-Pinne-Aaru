<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>HostelKart Login</title>
<style>
:root{
    --bg:#021b27;
    --card:#08293a;
    --input:#0a3a52;
    --green:#00d26a;
    --text:#ffffff;
    --secondary:#b0c0cf;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:var(--card);
    border-radius:35px;
    padding:35px 25px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.logo{
    text-align:center;
    color:var(--green);
    font-size:54px;
    font-weight:700;
    margin-bottom:12px;
}

.subtitle{
    text-align:center;
    color:var(--secondary);
    font-size:18px;
    margin-bottom:30px;
}

input{
    width:100%;
    height:65px;
    background:var(--input);
    border:none;
    outline:none;
    border-radius:22px;
    padding:0 22px;
    margin-bottom:18px;
    color:white;
    font-size:18px;
}

input::placeholder{
    color:#9fb3c8;
}

button{
    width:100%;
    height:68px;
    border:none;
    border-radius:22px;
    background:var(--green);
    color:white;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    margin-top:8px;
}

button:active{
    transform:scale(0.98);
}

.bottom-text{
    text-align:center;
    color:var(--secondary);
    margin-top:28px;
    font-size:16px;
}

a{
    display:block;
    text-align:center;
    color:var(--green);
    font-weight:700;
    text-decoration:none;
    margin-top:8px;
    font-size:18px;
}

@media(max-height:700px){
    body{
        align-items:flex-start;
        padding-top:40px;
        padding-bottom:40px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="top">
        <h1> Njan Allathe Pinne Aaru</h1>
        <p>For the Hostlers , By the Hostlers </p>
    </div>

    <class="form">

    <input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

    <button class="login-btn" onclick="login()">
    Login
</button>

        <div class="footer">
    <p class="text">
        Already have an account?
    </p>

    <a class="link" href="login.html">
        Login here
    </a>
        </div>

</div>
<script type="module">

import { auth } from "./firebase.js";

import {
signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

window.login = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
    localStorage.setItem("isDelivery","true");
    location.href="hostel.html";
})
.catch(error=>{
    alert(error.message);
});

}

</script>

</body>
</html>
