<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>HostelKart Login</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#071923;
    color:white;

    /* SAFE MOBILE SCROLL LAYOUT */
    min-height:100vh;
    padding:24px 16px;

    display:flex;
    justify-content:center;
}

/* CARD */
.container{
    width:100%;
    max-width:380px;

    background:#0d2533;
    border-radius:18px;

    padding:26px 18px;

    box-shadow:0 12px 35px rgba(0,0,0,0.4);

    /* IMPORTANT: prevents overflow issues */
    margin-top:40px;
}

/* TITLE */
h1{
    text-align:center;
    color:#00d26a;
    font-size:26px;
    margin-bottom:6px;
}

/* SUBTITLE */
.subtitle{
    text-align:center;
    color:#9fb3c8;
    font-size:13px;
    margin-bottom:22px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px;

    margin-bottom:12px;

    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);

    background:#123246;
    color:white;

    font-size:16px;

    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#00d26a,#00b85c);
    color:white;

    font-size:16px;
    font-weight:600;

    margin-top:6px;
}

/* FOOTER */
.footer{
    margin-top:18px;
    text-align:center;
}

.footer .text{
    color:#9fb3c8;
    font-size:13px;
    margin-bottom:6px;
}

.footer .link{
    color:#00d26a;
    font-weight:600;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="top">
        <h1> Njan Allathe Pinne Aaru</h1>
        <p>For the Hostlers , By the Hostlers </p>
    </div>

    <class="form">

    <input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

    <button class="login-btn" onclick="login()">
    Login
</button>

        <div class="footer">
    <p class="text">
        Already have an account?
    </p>

    <a class="link" href="login.html">
        Login here
    </a>
        </div>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

window.login = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
    localStorage.setItem("isDelivery","true");
    location.href="hostel.html";
})
.catch(error=>{
    alert(error.message);
});

}

</script>

</body>
</html>
