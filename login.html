<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>HostelKart Login</title>
<style>

:root{
    --bg:#071923;
    --card:#0d2533;
    --green:#00d26a;
    --green-dark:#00b85c;
    --text:#ffffff;
    --secondary:#9fb3c8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);

    /* 🔥 SAFE MOBILE CENTERING */
    min-height:100vh;
    display:flex;
    justify-content:center;

    /* IMPORTANT: removes vertical centering issues */
    align-items:flex-start;

    padding:24px 16px;
}

/* 🔥 MAIN CARD */
.container{
    width:100%;
    max-width:420px;
    background:var(--card);

    margin-top:40px;

    padding:26px 20px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.05);

    box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

/* TITLE */
h1{
    text-align:center;
    color:var(--green);
    font-size:28px;
    margin-bottom:6px;
}

/* SUBTITLE */
.subtitle{
    text-align:center;
    color:var(--secondary);
    font-size:13px;
    margin-bottom:24px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px;

    margin-bottom:12px;

    background:#123246;
    color:white;

    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;

    font-size:16px;

    outline:none;
}

/* focus */
input:focus{
    border-color:var(--green);
    box-shadow:0 0 10px rgba(0,210,106,0.25);
}

/* BUTTON */
button{
    width:100%;
    padding:14px;

    margin-top:6px;

    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:white;

    border:none;
    border-radius:12px;

    font-size:16px;
    font-weight:600;
}

/* TEXT */
p{
    text-align:center;
    margin-top:16px;
    color:var(--secondary);
    font-size:14px;
}

a{
    color:var(--green);
    font-weight:600;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="top">
        <h1> Njan Allathe Pinne Aaru</h1>
        <p>For the Hostlers , By the Hostlers </p>
    </div>

    <div class="form">

    <input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

    <button class="login-btn" onclick="login()">
    Login
</button>

        <div class="signup">
            New user?
            <a href="signup.html">Sign Up</a>
        </div>

    </div>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

window.login = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
    localStorage.setItem("isDelivery","true");
    location.href="hostel.html";
})
.catch(error=>{
    alert(error.message);
});

}

</script>

</body>
</html>
