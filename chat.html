<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Chat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#071923;
    --card:#0d2533;
    --green:#00d26a;
    --green-dark:#00b85c;
    --text:#ffffff;
    --secondary:#9fb3c8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#0b1f2b;
    color:var(--green);
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,0.08);
    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    background:var(--card);
    color:var(--text);
    padding:6px 10px;   /* reduced from 12px */
    border-radius:12px;
    max-width:80%;
    word-wrap:break-word;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    line-height:1.2;
}

.mine{
    margin-left:auto;
    background:linear-gradient(
        135deg,
        var(--green),
        var(--green-dark)
    );
    color:white;
}
.bottom button{
    background:#00d26a;
    color:white;
    border:none;
    height:50px;
    padding:0 20px;
    border-radius:25px;
    font-weight:600;
    cursor:pointer;
    flex-shrink:0;
}
small{
    display:block;
    margin-top:2px;   /* reduced from 6px */
    font-size:11px;
    opacity:0.8;
    text-align:right;
}
.bottom{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
}

#msg{
    flex:1;
    padding:10px 18px;
    height:50px;
    background:#123246;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    outline:none;
}

.bottom button{
    width:70px;
    height:50px;
    border-radius:999px;
}

.bottom button:active{
    transform:scale(0.98);
}
  

</style>
</head>

<body>

<header>
    <h2>Order Chat</h2>
</header>

<div id="messages"></div>

<div class="bottom">

    <input
        type="text"
        id="msg"
        placeholder="Type message">

    <button id="sendBtn">
    Send
    </button>

</div>

<script type="module">
  const start = Date.now();
  import {
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { auth, db } from "./firebase.js";

import {
    collection,
    addDoc,
    onSnapshot,
    query,
    where,
    orderBy,
    doc,
    getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
  

 const orderId = params.get("id");

const messagesDiv = document.getElementById("messages");


  onAuthStateChanged(auth, async (user) => {

    if (!user) {
        location.href = "login.html";
        return;
    }

    const cacheKey =
        "chat_" + orderId + "_" + user.email;

    const cachedChat =
        localStorage.getItem(cacheKey);

    if (cachedChat) {
        messagesDiv.innerHTML = cachedChat;
    }

    const orderRef = doc(db, "orders", orderId);
    const orderSnap = await getDoc(orderRef);
    const order = orderSnap.data();

    const q = query(
        collection(db, "chats"),
        where("orderId", "==", orderId)
    );

    async function sendMessage() {

    const text = document.getElementById("msg").value;

    if(text === "") return;

    // Show immediately
    messagesDiv.innerHTML += `
        <div class="message mine">
            <b>${user.displayName}</b><br>
            ${text}<br>
            <small>${new Date().toLocaleTimeString()}</small>
        </div>
    `;

    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    document.getElementById("msg").value = "";

    await addDoc(collection(db,"chats"),{
        orderId,
        sender:user.displayName,
        message:text,
        timestamp:Date.now(),
        read:false,
        time:new Date().toLocaleTimeString()
    });
    }

        

    document
        .getElementById("sendBtn")
        .addEventListener("click", sendMessage);

    onSnapshot(q, (snapshot) => {

        const chats = [];

        snapshot.forEach((docSnap) => {

            const chat = docSnap.data();

            if (
                chat.sender !== user.displayName &&
                chat.read === false
            ) {
                updateDoc(
                    doc(db, "chats", docSnap.id),
                    {
                        read: true
                    }
                );
            }

            chats.push(chat);
        });

        chats.sort(
            (a, b) =>
            a.timestamp - b.timestamp
        );

        let html = "";

        chats.forEach((chat) => {

            const mine =
                chat.sender === user.displayName;

            html += `
            <div class="message ${mine ? "mine" : ""}">
                <b>${chat.sender}</b><br>
                ${chat.message}<br>
                <small>${chat.time || ""}</small>
            </div>
            `;
        });

        messagesDiv.innerHTML = html;

        messagesDiv.scrollTop = 0
            messagesDiv.scrollHeight;

        localStorage.setItem(
            cacheKey,
            html
        );
    });
});
          </script>
</body>
</html>
