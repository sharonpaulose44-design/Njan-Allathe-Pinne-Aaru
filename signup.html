<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HostelKart - Sign Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#071923;
    --card:#0d2533;
    --green:#00d26a;
    --green-dark:#00b85c;
    --text:#ffffff;
    --secondary:#9fb3c8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:var(--card);
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    color:var(--green);
    margin-bottom:25px;
    font-size:32px;
    font-weight:700;
}

input,
select{
    width:100%;
    padding:16px;
    margin-bottom:15px;
    background:#123246;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    font-size:16px;
    outline:none;
}

input::placeholder{
    color:var(--secondary);
}

input:focus,
select:focus{
    border:1px solid var(--green);
    box-shadow:0 0 15px rgba(0,210,106,0.25);
}

button{
    width:100%;
    padding:16px;
    background:linear-gradient(
        135deg,
        var(--green),
        var(--green-dark)
    );
    color:white;
    border:none;
    border-radius:16px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.98);
}

p{
    text-align:center;
    margin-top:18px;
    color:var(--secondary);
}

a{
    color:var(--green);
    text-decoration:none;
    font-weight:600;
}
.subtitle{
    margin-top: 8px;
    margin-bottom: 20px;
    color: var(--secondary);
    font-size: 14px;
}
  h1{
    margin-bottom: 6px;
  }

</style>
</head>
<body>

<div class="container">

    <h1>NAPA</h1>
  <p class="subtitle">Njan Allathe Pinne Aaru ?</p>
  

    <input
        type="text"
        id="name"
        placeholder="Full Name">

    <input
        type="text"
        id="room"
        placeholder="Room Number">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">


    <button onclick="signup()">
        Sign Up
    </button>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>


<script type="module">

import { auth, db } from "./firebase.js";

import {
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

window.signup = async function(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
  
    try{

        const userCredential =
        await createUserWithEmailAndPassword(
            auth,
            email,
            password
        );

        await setDoc(
            doc(db,"users",userCredential.user.uid),
            {
                name: name,
                email: email,
        
            }
        );

        await updateProfile(
            userCredential.user,
            {
                displayName: name
            }
        );

        alert("Account Created Successfully!");
location.href = "hostel.html";
    }
    catch(error){
        alert(error.message);
    }

}

</script>
</body>
</html>
